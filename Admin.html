<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphene Trace - Admin Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  background: #f2f3f5;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-box {
  width: 60px;
  height: 60px;
  background: #1f2a3c;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-weight: bold;
}

.title h1 {
  font-size: 28px;
}

.title span {
  color: #666;
  font-size: 16px;
}

.admin-info {
  text-align: right;
}

.admin-info h3 {
  font-weight: 500;
}

.admin-info span {
  color: #777;
  font-size: 14px;
}

.logout-btn {
  margin-top: 5px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: #e9eaec;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 500;
}

.tab.active {
  background: #ffffff;
  border: 1px solid #ddd;
}

/* Card Container */
.card {
  background: white;
  border-radius: 18px;
  padding: 30px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* Form */
.card h2 {
  text-align: center;
  margin-bottom: 25px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #f1f2f4;
  font-size: 14px;
}

.row {
  display: flex;
  gap: 15px;
}

.row .form-group {
  flex: 1;
}

.btn-primary {
  width: 100%;
  padding: 15px;
  background: #1f2a3c;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary:hover {
  opacity: 0.9;
}

/* Recently Created */
.recent-section {
  margin-top: 35px;
}

.recent-section h3 {
  margin-bottom: 20px;
}

.user-card {
  background: #f7f7f8;
  padding: 20px;
  border-radius: 18px;
  border: 1px solid #e3e3e3;
  margin-bottom: 15px;
}

.user-card h4 {
  margin-bottom: 5px;
}

.user-card span {
  color: #777;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo-section">
    <div class="logo-box">Logo</div>
    <div class="title">
      <h1>Graphene Trace</h1>
      <span>Admin Dashboard</span>
    </div>
  </div>

  <div class="admin-info">
    <h3>Admin Name</h3>
    <span>System Administrator</span><br>
    <button class="logout-btn">⎋</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active">Create Accounts</div>
  <div class="tab">Manage Accounts</div>
</div>

<!-- Main Card -->
<div class="card">
  <h2>Create New User Account</h2>

  <div class="form-group">
    <label>Account Type</label>
    <select>
      <option>Patient</option>
      <option>Clinician</option>
      <option>Administrator</option>
    </select>
  </div>

  <div class="row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text">
    </div>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email">
  </div>

  <div class="form-group">
    <label>Patient ID</label>
    <input type="text" placeholder="P-XXXX">
  </div>

  <button class="btn-primary">Create Account</button>

  <!-- Recently Created -->
  <div class="recent-section">
    <h3>Recently Created Accounts</h3>

    <div class="user-card">
      <h4>User Name 1</h4>
      <span>Patient • P-006</span>
    </div>

    <div class="user-card">
      <h4>User Name 2</h4>
      <span>Clinician • C-005</span>
    </div>

    <div class="user-card">
      <h4>User Name 3</h4>
      <span>Patient • P-005</span>
    </div>

  </div>
</div>

</body>
</html>
